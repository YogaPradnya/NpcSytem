<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC Character Chat - Animein.ai</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Karakter -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>ANIMEIN NPC</h1>
            </div>
            <div class="char-list" id="charList">
                <!-- Karakter akan dimuat di sini -->
                <div class="loading-chars">Memuat karakter...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="active-char-info">
                    <div class="avatar" id="activeAvatar">A</div>
                    <div>
                        <h2 id="activeName">Nama Karakter</h2>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">Online</span>
                    </div>
                </div>
            </div>

            <div class="messages" id="messageList">
                <div class="empty-chat">
                    <i class="fas fa-comments"></i>
                    <p>Pilih karakter dari daftar di samping<br>untuk mulai mengobrol.</p>
                </div>
            </div>

            <div class="loading" id="aiLoading">
                AI sedang mengetik...
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="userInput" placeholder="Ketik pesan Anda..." autocomplete="off">
                <button id="sendBtn">Kirim</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
