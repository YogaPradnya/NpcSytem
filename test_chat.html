<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC Chat Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .tester-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 90vh;
        }
        header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }
        .config-bar {
            padding: 1rem;
            background: #f1f5f9;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .config-bar input, .config-bar select {
            padding: 0.4rem;
            border: 1px solid var(--border);
            border-radius: 0.3rem;
            font-size: 0.8rem;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.9rem; line-height: 1.4; }
        .msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 0.2rem; }
        .msg.ai { align-self: flex-start; background: #f1f5f9; color: var(--text); border-bottom-left-radius: 0.2rem; }
        
        .input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            outline: none;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
        }
        #loading { font-size: 0.75rem; color: var(--primary); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="tester-container">
        <header>
            <h2 style="color: var(--primary)">NPC Playground</h2>
            <p style="font-size: 0.8rem; color: var(--text-muted)">Standalone Testing Tool</p>
        </header>
        
        <div class="config-bar">
            <input type="text" id="base_url" value="http://localhost:4000" placeholder="Base URL">
            <input type="text" id="ai_name" value="alya" placeholder="AI Name">
            <select id="user_lv">
                <option value="0">Lv 0 (Asing)</option>
                <option value="1">Lv 1 (Kenalan)</option>
                <option value="3" selected>Lv 3 (Teman)</option>
                <option value="5">Lv 5 (Kekasih)</option>
            </select>
            <select id="time_day">
                <option value="PAGI">PAGI</option>
                <option value="SIANG">SIANG</option>
                <option value="SORE">SORE</option>
                <option value="MALAM">MALAM</option>
            </select>
        </div>

        <div id="chat-window">
            <div class="msg ai">Halo! Silakan ketik pesan untuk mencoba interaksi.</div>
        </div>

        <div class="input-area">
            <div style="flex:1">
                <input type="text" id="msg-input" placeholder="Tanyakan sesuatu..." style="width:100%" onkeypress="if(event.key==='Enter') send()">
                <div id="loading" style="display:none">NPC sedang mengetik...</div>
            </div>
            <button class="btn" onclick="send()">Kirim</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('msg-input');
            const url = document.getElementById('base_url').value.replace(/\/$/, "");
            const msg = input.value.trim();
            if(!msg) return;

            input.value = '';
            addMsg('user', msg);
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(url + '/api/npc/v1/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: msg,
                        user: { username: "Yogaa", level: parseInt(document.getElementById('user_lv').value) },
                        context: { 
                            location: "Taman", 
                            time: document.getElementById('time_day').value, 
                            mood: "normal" 
                        },
                        system: { ai_name: document.getElementById('ai_name').value }
                    })
                });
                const data = await response.json();
                if(data.sentences) {
                    data.sentences.forEach(s => addMsg('ai', s));
                } else if(data.error) {
                    addMsg('ai', "Error: " + data.error);
                }
            } catch(e) {
                addMsg('ai', "Gagal terhubung ke API. Pastikan server lokal menyala dan CORS diizinkan.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function addMsg(type, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
